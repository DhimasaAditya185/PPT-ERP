<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Company Profile - PT Imaji Cipta Technology</title>
    <link rel="icon" type="image/jpeg" href="image/icon.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Roboto', sans-serif;
            background: #0A192F;
            color: #e0e0e0;
            overflow: hidden;
            height: 100vh;
        }

        /* Toolbar */
        .toolbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 56px;
            background: rgba(10, 25, 47, 0.95);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
            border-bottom: 1px solid rgba(0, 180, 216, 0.2);
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .toolbar-logo {
            height: 36px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .toolbar-logo img {
            height: 32px;
            width: auto;
            filter: brightness(0) invert(1);
        }

        .toolbar-logo span {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 16px;
            color: #ffffff;
            letter-spacing: 1px;
        }

        .toolbar-divider {
            width: 1px;
            height: 24px;
            background: rgba(255, 255, 255, 0.15);
        }

        .toolbar-title {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 400;
        }

        .toolbar-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }

        .btn-download {
            background: #00B4D8;
            color: #0A192F;
        }

        .btn-download:hover {
            background: #00C9F0;
            box-shadow: 0 4px 15px rgba(0, 180, 216, 0.3);
        }

        /* PDF Viewer Area */
        .viewer-container {
            position: fixed;
            top: 56px;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d1f36;
        }

        /* State: PDF loaded */
        .pdf-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }

        /* State: No PDF yet (placeholder) */
        .placeholder {
            text-align: center;
            padding: 40px;
            animation: fadeIn 0.6s ease;
        }

        .placeholder-logo {
            margin-bottom: 30px;
        }

        .placeholder-logo img {
            height: 80px;
            width: auto;
            filter: brightness(0) invert(1);
            opacity: 0.15;
        }

        .placeholder-icon {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(0, 180, 216, 0.06);
            border: 2px solid rgba(0, 180, 216, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
        }

        .placeholder-icon i {
            font-size: 40px;
            color: rgba(0, 180, 216, 0.4);
        }

        .placeholder h2 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 28px;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 8px;
        }

        .placeholder .subtitle {
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            color: #00B4D8;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .placeholder .desc {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.35);
            max-width: 400px;
            line-height: 1.7;
            margin: 0 auto 35px;
        }

        .placeholder .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 180, 216, 0.08);
            border: 1px solid rgba(0, 180, 216, 0.2);
            border-radius: 30px;
            padding: 10px 24px;
            font-size: 13px;
            color: #00B4D8;
            font-weight: 600;
        }

        .status-badge .dot {
            width: 8px;
            height: 8px;
            background: #00B4D8;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile */
        @media (max-width: 768px) {
            .toolbar { padding: 0 16px; }
            .toolbar-logo span { display: none; }
            .toolbar-divider { display: none; }
            .toolbar-title { font-size: 13px; }
            .btn { padding: 7px 14px; font-size: 12px; }
            .btn span.btn-text { display: none; }
            .placeholder h2 { font-size: 20px; }
            .placeholder p { font-size: 13px; }
            .upload-area { padding: 20px 24px; }
            .placeholder-icon { width: 90px; height: 90px; }
            .placeholder-icon i { font-size: 36px; }
        }
    </style>
</head>
<body>
    <!-- Toolbar -->
    <div class="toolbar">
        <div class="toolbar-left">
            <a href="index.html" class="toolbar-logo">
                <img src="Logo.png" alt="IMAJI">
                <span>IMAJI</span>
            </a>
            <div class="toolbar-divider"></div>
            <span class="toolbar-title">Company Profile</span>
        </div>
        <div class="toolbar-actions">
            <a href="index.html" class="btn btn-back">
                <i class="fas fa-arrow-left"></i>
                <span class="btn-text">Kembali</span>
            </a>
            <button class="btn btn-download" id="btnDownload" style="display:none;" onclick="downloadPdf()">
                <i class="fas fa-download"></i>
                <span class="btn-text">Download PDF</span>
            </button>
        </div>
    </div>

    <!-- Viewer -->
    <div class="viewer-container">
        <iframe class="pdf-frame" id="pdfFrame"></iframe>

        <div class="placeholder" id="placeholder">
            <div class="placeholder-logo">
                <img src="Logo.png" alt="IMAJI">
            </div>
            <div class="placeholder-icon">
                <i class="fas fa-file-pdf"></i>
            </div>
            <h2>Company Profile</h2>
            <p class="subtitle">Coming Soon</p>
            <p class="desc">Dokumen company profile sedang dalam proses penyusunan dan akan segera tersedia di halaman ini.</p>
            <div class="status-badge">
                <span class="dot"></span>
                Dalam Pengembangan
            </div>
        </div>
    </div>

    <script>
        // Load PDF directly - hide placeholder, show viewer
        function loadPdf() {
            const pdfUrl = 'company-profile.pdf?v=' + Date.now();
            const frame = document.getElementById('pdfFrame');
            const placeholder = document.getElementById('placeholder');
            const btnDownload = document.getElementById('btnDownload');

            frame.src = pdfUrl;
            frame.style.display = 'block';
            placeholder.style.display = 'none';
            btnDownload.style.display = 'flex';

            // If iframe fails to load (no PDF), show placeholder again
            frame.onerror = function() {
                frame.style.display = 'none';
                placeholder.style.display = 'block';
                btnDownload.style.display = 'none';
            };
        }

        function downloadPdf() {
            const a = document.createElement('a');
            a.href = 'company-profile.pdf';
            a.download = 'Company-Profile-IMAJI.pdf';
            a.click();
        }

        loadPdf();
    </script>
</body>
</html>
